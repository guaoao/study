<!DOCTYPE  html>
<html>
  <head>
    <meta charset="utf-8">
    <title>그리드</title>
    <style>
      #grid {
        border:5px solid blue;
        display:grid;
        grid-template-columns: 1fr 1fr;
      }
      div {
        border:5px solid gray;
      }
    </style>
  </head>
  <body>
    <div id="grid">
      <div>NAVIGATION</div>
      <div>ARTICLE 시 원더우먼 여행 책상 고슴도치 만화가 산부인과 칫솔 금붕어 공항 타조 인물 바람 괴물 클럽 오븐 배추 벼 일 불도저 치아 장학금 외과 사전 약국 캐나다 이집트 도시락</div>
    </div>
  </body>
</html>
